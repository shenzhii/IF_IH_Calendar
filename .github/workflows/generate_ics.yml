name: Generate ICS

# 定时触发 + 手动触发
on:
  schedule:
    - cron: '0 0 * * 0'  # 每周日 00:00 UTC 运行
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 兼容 Node.js 24

    steps:
      # 获取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4   # 最新版本，兼容 Node.js 24

      # 设置 Python
      - name: Setup Python
        uses: actions/setup-python@v5   # 最新版本，兼容 Node.js 24
        with:
          python-version: 3.x

      # 生成 ICS
      - name: Generate ICS
        run: python scripts/generate_ics.py

      # 提交 ICS 文件
      - name: Commit ICS
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "github-actions@github.com"
          git add IF_IH.ics
          git commit -m "更新 ICS 文件 [自动生成]" || echo "No changes to commit"
          git push
